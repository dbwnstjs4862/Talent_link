<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>상대방 프로필</title>
  <style>
    main {
      max-width: 600px;
      margin: 3rem auto;
      padding: 2rem;
      background-color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }

    .nickname {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background-color: #333;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

<div th:replace="common/header :: header"></div>

<main>
  <div class="nickname" th:text="${target.nickname}">상대 닉네임</div>
  <a th:href="@{'/chat/start/' + ${target.id}}" class="btn">💬 채팅하기</a>
</main>

</body>
</html>
