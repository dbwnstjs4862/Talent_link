<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이페이지 - TalentLink</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
      margin: 0;
    }

    main {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 1rem;
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      color: #333;
    }

    .card p {
      flex-grow: 1;
      color: #666;
    }

    .card a {
      margin-top: 1rem;
      text-align: center;
      padding: 10px;
      background-color: #333;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .card a:hover {
      background-color: #444;
    }
  </style>
</head>
<body>

<!-- ✅ 공통 헤더 -->
<div th:replace="common/header :: header"></div>

<main>
  <h2>👤 마이페이지</h2>

  <div class="card-grid">

    <!-- 내 정보 보기 -->
    <div class="card">
      <h3>내 정보</h3>
      <p>닉네임, 프로필 등 계정 정보를 확인하거나 수정할 수 있어요.</p>
      <a th:href="@{/mypage/profile}">내 정보 보기</a>
    </div>

    <!-- 내가 등록한 재능 -->
    <div class="card">
      <h3>내가 등록한 재능</h3>
      <p>지금까지 등록한 재능을 확인할 수 있어요.</p>
      <a th:href="@{/mypage/posts}">재능 목록 보기</a>
    </div>

    <!-- 내가 요청한 의뢰 -->
    <div class="card">
      <h3>내 요청 내역</h3>
      <p>다른 사용자에게 요청했던 글을 확인할 수 있어요.</p>
      <a th:href="@{/mypage/talentrequests}">요청 목록 보기</a>
    </div>

  </div>
</main>

<!-- ✅ 공통 푸터 -->
<div th:replace="common/footer :: footer"></div>

</body>
</html>
