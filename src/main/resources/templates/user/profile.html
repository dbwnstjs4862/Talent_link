<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 정보 - TalentLink</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }

        main {
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .btn-box {
            margin-top: 2rem;
            text-align: center;
        }

        .btn-box a {
            display: inline-block;
            margin: 0 0.5rem;
            padding: 10px 16px;
            background-color: #333;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn-box a:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

<!-- ✅ 공통 헤더 -->
<div th:replace="common/header :: header"></div>

<main>
    <h2>👤 내 정보</h2>

    <table>
        <tr>
            <th>닉네임</th>
            <td th:text="${user.nickname}">닉네임</td>
        </tr>
    </table>

    <div class="btn-box">
        <a th:href="@{/mypage/profile/edit}">✏️ 내 정보 수정</a>
        <a th:href="@{/mypage}">← 마이페이지로</a>
    </div>
</main>

<!-- ✅ 공통 푸터 -->
<div th:replace="common/footer :: footer"></div>

</body>
</html>
