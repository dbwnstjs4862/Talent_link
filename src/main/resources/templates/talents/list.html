<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전체 재능 목록 - TalentLink</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
        }

        main {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 1rem;
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background-color: #333;
            color: white;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background-color: #f3f3f3;
        }

        a.register-link {
            display: inline-block;
            margin-top: 1.5rem;
            text-align: center;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
        }

        a.register-link:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

<div th:replace="common/header :: header"></div>

<main>
    <h2>🌎 전체 재능 목록</h2>

    <table>
        <thead>
        <tr>
            <th>제목</th>
            <th>설명</th>
            <th>가격</th>
            <th>작성자</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="talent : ${talents}">
            <td>
                <a th:href="@{'/talents/' + ${talent.id}}" th:text="${talent.title}">제목</a>
            </td>
            <td th:text="${talent.description}">설명</td>
            <td th:text="${talent.price} + '원'">가격</td>
            <td th:text="${talent.user.nickname}">작성자</td>
            <td th:text="${#temporals.format(talent.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</td>
        </tr>
        </tbody>
    </table>

    <div style="text-align: center;">
        <a th:href="@{/talents/register}" class="register-link">➕ 재능 등록하러 가기</a>
    </div>
</main>

<div th:replace="common/footer :: footer"></div>

</body>
</html>
