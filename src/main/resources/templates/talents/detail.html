<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>재능 상세</title>
</head>
<body>
<h1 th:text="${talent.title}">제목</h1>

<p>
    <strong>작성자:</strong>
    <span th:text="${talent.nickname}">닉네임</span>
</p>

<p>
    <strong>작성일:</strong>
    <span th:text="${#temporals.format(talent.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
</p>

<p><strong>설명:</strong></p>
<p th:text="${talent.description}">설명</p>

<p>
    <strong>가격:</strong>
    <span th:text="${talent.price}">가격</span> 원
</p>

<br>
<a th:href="@{/talents}">← 목록으로 돌아가기</a>
</body>
</html>
