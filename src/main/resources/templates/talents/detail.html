<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재능 상세 - TalentLink</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }

        main {
            max-width: 700px;
            margin: 3rem auto;
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .meta {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .section-title {
            margin-top: 2rem;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .price {
            font-size: 1.2rem;
            margin-top: 1.5rem;
            font-weight: bold;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #007acc;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div th:replace="common/header :: header"></div>

<main>
    <h2 th:text="${talent.title}">재능 제목</h2>

    <div class="meta">
        👤
        <a th:href="@{'/users/' + ${talent.user.id}}" class="nickname"
           style="text-decoration: none; color: inherit;"
           th:text="${talent.user.nickname}">작성자</a>
        |
        🗓️ <span th:text="${#temporals.format(talent.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
    </div>


    <div>
        <div class="section-title">📄 설명</div>
        <p th:text="${talent.description}">설명 내용</p>
    </div>

    <div class="price">
        💰 가격: <span th:text="${talent.price}">가격</span> 원
    </div>

    <a class="back-link" th:href="@{/talents}">← 목록으로 돌아가기</a>
</main>

<div th:replace="common/footer :: footer"></div>

</body>
</html>
