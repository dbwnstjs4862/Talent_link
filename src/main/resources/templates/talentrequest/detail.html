<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title th:text="'요청 상세 - ' + ${request.title}">요청 상세</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; margin: 0; }
    main {
      max-width: 700px; margin: 3rem auto; background: white; padding: 2rem;
      border-radius: 8px; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    h2 { font-size: 1.8rem; margin-bottom: 1rem; }
    .meta { font-size: 0.95rem; color: #666; margin-bottom: 1.5rem; }
    .section { margin-top: 2rem; }
    .section-title { font-weight: bold; margin-bottom: 0.5rem; }
    .price { font-size: 1.2rem; font-weight: bold; margin-top: 1rem; }
    .back-link {
      display: inline-block; margin-top: 2rem; text-decoration: none; color: #007acc;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div th:replace="common/header :: header"></div>
<main>
  <h2 th:text="${request.title}">요청 제목</h2>
  <div class="meta">
    👤 <a th:href="@{'/users/' + ${request.user.id}}" class="nickname"
         style="text-decoration: none; color: inherit;"
         th:text="${request.user.nickname}">작성자</a> |
    🗓️ <span th:text="${#temporals.format(request.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span> |
    ⏰ 마감일: <span th:text="${#temporals.format(request.deadline, 'yyyy-MM-dd HH:mm')}">마감일</span>
  </div>
  <div class="section">
    <div class="section-title">📄 요청 내용</div>
    <p th:text="${request.description}">요청 설명</p>
  </div>
  <div class="price">
    💰 예산: <span th:text="${request.budget}">50000</span> 원
  </div>
  <a class="back-link" th:href="@{/talentrequests}">← 전체 요청 목록으로 돌아가기</a>
</main>
<div th:replace="common/footer :: footer"></div>
</body>
</html>
