<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>채팅방</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f2f2f2; }
        .chat-container {
          width: 600px; margin: 3rem auto; padding: 1rem;
          background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .messages { height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; }
        .message { margin-bottom: 0.8rem; }
        .message.you { text-align: right; color: blue; }
        input, button { width: 100%; padding: 0.7rem; font-size: 1rem; }
        button { background: #333; color: white; border: none; margin-top: 0.5rem; }
        button:hover { background: #444; }
    </style>
</head>
<body>

<!-- ✅ 공통 헤더 삽입 -->
<div th:replace="common/header :: header"></div>

<div class="chat-container">
    <h2>💬 채팅방</h2>
    <div id="messages" class="messages"></div>

    <input type="text" id="chatInput" placeholder="메시지를 입력하세요..."/>
    <button onclick="sendMessage()">전송</button>
</div>

<script th:inline="javascript">
    const roomId = [[${roomId}]];
    const senderId = [[${currentUserId}]];
    const senderNickname = [[${nickname}]];
    const otherUserId = [[${otherUserId}]];

    let stompClient;

    function loadPreviousMessages() {
    fetch(`/api/chat/messages/${roomId}`)
        .then(response => response.json())
        .then(messages => {
            const messageBox = document.getElementById("messages");
            messageBox.innerHTML = ""; // 기존 메시지 클리어 (선택)

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.classList.add('message');

                const isMine = msg.senderId == senderId;
                if (isMine) div.classList.add('you');

                let messageHtml = `${msg.senderNickname}: ${msg.content}`;

                // 읽음 여부 추가
                if (isMine) {
                    if (msg.read && msg.senderId == senderId) {
                        messageHtml += " ✔ 읽음";
                    } else {
                        messageHtml += " 1";
                    }
                }

                div.innerHTML = messageHtml;
                messageBox.appendChild(div);
            });

            messageBox.scrollTop = messageBox.scrollHeight;
        });
    }

    function connect() {
      const socket = new SockJS('/ws-chat');
      stompClient = Stomp.over(socket);
      stompClient.connect({}, function () {
        // 메시지 수신
        stompClient.subscribe(`/sub/chat/room/${roomId}`, function (message) {
          const msg = JSON.parse(message.body);
          const div = document.createElement('div');
          div.classList.add('message');
          if (msg.senderId === senderId) div.classList.add('you');
          div.textContent = `${msg.senderNickname}: ${msg.content}`;
          if (msg.read && msg.senderId === senderId) {
            div.textContent += " ✔ 읽음";
          }
          document.getElementById("messages").appendChild(div);
          document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });

        // 읽음 알림 수신
        stompClient.subscribe(`/sub/chat/read/${senderId}`, function (msg) {
          markMessagesAsReadUI(msg.body);
        });

        // 입장 시 읽음 처리 발행
        sendReadSignal();
      });
    }

    function sendMessage() {
      const content = document.getElementById("chatInput").value;
      if (!content.trim()) return;
      const msg = {
        roomId: roomId,
        senderId: senderId,
        receiverId: otherUserId,
        senderNickname: senderNickname,
        content: content,
        type: 'TALK'
      };
      stompClient.send("/pub/chat/message", {}, JSON.stringify(msg));
      document.getElementById("chatInput").value = "";
    }

    function sendReadSignal() {
      stompClient.send("/pub/chat/read", {}, JSON.stringify({
        roomId: roomId,
        senderId: otherUserId,
        receiverId: senderId,
        type: "READ"
      }));
    }

    function markMessagesAsReadUI(roomIdFromMsg) {
      const myMessages = document.querySelectorAll('.message.you');
      myMessages.forEach(msgDiv => {
        if (!msgDiv.textContent.includes("✔ 읽음")) {
          msgDiv.textContent += " ✔ 읽음";
        }
      });
    }

    // ✅ 페이지 로딩 시 실행
    loadPreviousMessages();
    connect();
</script>

</body>
</html>
